[mod-name]
interplanetary-logistics=Interplanetary Logistics

[mod-description]
interplanetary-logistics=Routes requester-chest and construction-alert shortages through enrolled space platforms.

[entity-name]
interplanetary-requester-chest=Interplanetary Requester Chest

[entity-description]
interplanetary-requester-chest=Requests locally first, then publishes unresolved shortages to the interplanetary logistics network.

[item-name]
interplanetary-requester-chest=Interplanetary Requester Chest

[recipe-name]
interplanetary-requester-chest=Interplanetary Requester Chest

[shortcut-name]
il-toggle-dashboard=Interplanetary Logistics

[controls]
il-toggle-dashboard-input=Toggle Interplanetary Logistics

[mod-setting-name]
il-auto-approve-seconds=Auto-approve delay
il-scan-interval=Network scan interval
il-source-reserve=Source planet reserve
il-enable-ready-signal=Require ready signal
il-ready-signal=Ready virtual signal

[mod-setting-description]
il-auto-approve-seconds=Seconds before an untouched request is automatically approved. Set to 0 for immediate approval.
il-scan-interval=Ticks between requester chest, construction alert, and transfer scans.
il-source-reserve=Items that must remain available in every candidate source network.
il-enable-ready-signal=When enabled, temporary pickup stops wait for the configured virtual signal as well as the requested cargo.
il-ready-signal=Virtual signal used to release a platform from a temporary pickup stop.

